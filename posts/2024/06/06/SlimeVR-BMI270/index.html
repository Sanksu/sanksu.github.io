self.__next_f.push([1,"\n## **SlimeVR_BMI270**\n\n- [з«ӢеҲӣејҖжәҗе№іеҸ°](https://oshwhub.com/sanksu/slimevr_bmi270)\n![SlimeVR_Server.png](https://image.lceda.cn/oshwhub/f2e35224d06b4dde9bd27ad48a2b8369.png)\n\n### **1. д»Җд№ҲжҳҜSlimeVRпјҹ**\n\nSlimeVRжҳҜдёҖз»„ејҖж”ҫзҡ„зЎ¬д»¶дј ж„ҹеҷЁе’ҢејҖжәҗиҪҜд»¶пјҢжңүеҠ©дәҺеңЁиҷҡжӢҹзҺ°е®һдёӯе®һзҺ°е…Ёиә«и·ҹиёӘпјҲFBTпјүгҖӮ\n\n- [е®ҳж–№ж–ҮжЎЈ](https://docs.slimevr.dev/)\n- [l0ud/SlimeVR-Tracker-ESP-BMI270еҲҶж”Ҝ](https://github.com/l0ud/SlimeVR-Tracker-ESP-BMI270)\n\n### **2. д»Ӣз»Қ**\n\nжң¬йЎ№зӣ®з”ұ ESP-12F + IP5306-CK + BMI270 з»„жҲҗпјҢCH340Kе®һзҺ°иҮӘеҠЁдёӢиҪҪпјҢйҮҮз”ЁLDOйҷҚеҺӢпјҢжҸҗдҫӣ3.3Vдҫӣз”ө\n\n**е®ҳзҪ‘еҜ№BMI270зҡ„д»Ӣз»ҚеҰӮдёӢ**пјҡBMI270 жҳҜдёҖж¬ҫзӣёеҜ№иҫғж–°зҡ„е®һйӘҢжҖ§ IMUпјҢз”ЁдәҺ DIY SlimeVRгҖӮ е®ғзҡ„жҖ§иғҪдјјд№ҺжҳҺжҳҫдјҳдәҺ BMI160пјҢеҗҢж—¶д»·ж је®һжғ гҖӮ\nеӨ–еЈідҪҝз”ЁFusion360и®ҫи®Ў![еӨ–еЈі](https://cdn.jsdelivr.net/gh/Sanksu/SlimeVR_BMI270@main/IMG/Assembly.gif)\n\n### **3. еӣәд»¶**\n\nSlimeVR еӣәд»¶зҡ„дё»еҲҶж”Ҝе°ҡдёҚж”ҜжҢҒжӯӨBMI270пјҢеӣ жӯӨжң¬йЎ№зӣ®дҪҝз”Ё[`l0ud/SlimeVR-Tracker-ESP-BMI270`](https://github.com/l0ud/SlimeVR-Tracker-ESP-BMI270)еҲҶж”Ҝ\n\n#### 3.1 **жһ„е»ә SlimeVR еӣәд»¶**\n\n- е®үиЈ…[CH340й©ұеҠЁ](https://cdn.sparkfun.com/assets/learn_tutorials/8/4/4/CH341SER.EXE)\n- VSCodeе®үиЈ…PlatformIO IDEжү©еұ•\n\n- е…ӢйҡҶ[`l0ud/SlimeVR-Tracker-ESP-BMI270`](https://github.com/l0ud/SlimeVR-Tracker-ESP-BMI270)еҲҶж”Ҝе№¶йҖҡиҝҮVSCodeжү“ејҖ(еңЁжӯӨжңҹй—ҙVSCodeдјҡиҮӘеҠЁй…ҚзҪ®зҺҜеўғпјҢиҜ·дҝқжҢҒзҪ‘з»ңз•…йҖҡ)\n- еңЁ `platformio.ini` и®ҫзҪ®`DWIFI_CREDS_SSID`е’Ң`DWIFI_CREDS_PASSWD`\n- жӣҝжҚў`src`/`defines.h`\n\n```c\n#define IMU IMU_BMI270\n#define SECOND_IMU IMU\n#define BOARD BOARD_CUSTOM\n#define IMU_ROTATION DEG_90\n#define SECOND_IMU_ROTATION DEG_0\n\n#define PRIMARY_IMU_OPTIONAL true\n#define SECONDARY_IMU_OPTIONAL true\n\n#define MAX_IMU_COUNT 1\n\n#ifndef IMU_DESC_LIST\n#define IMU_DESC_LIST \\\n    IMU_DESC_ENTRY(IMU,        PRIMARY_IMU_ADDRESS_ONE,   IMU_ROTATION,        PIN_IMU_SCL, PIN_IMU_SDA, PRIMARY_IMU_OPTIONAL,   PIN_IMU_INT)\n\n#endif\n\n#define BATTERY_MONITOR BAT_EXTERNAL\n#define BATTERY_SHIELD_RESISTANCE 180\n\n#define PIN_IMU_SDA D2\n#define PIN_IMU_SCL D1\n#define PIN_IMU_INT D0\n#define PIN_IMU_INT_2 D5\n#define PIN_BATTERY_LEVEL A0\n```\n\n#### 3.2 **дёҠдј еӣәд»¶**\n\n- дҪҝз”Ёж•°жҚ®зәҝиҝһжҺҘ\n- зӮ№еҮ»`PlatformIO:Upload`,зӯүеҫ…зғ§еҪ•е®ҢжҲҗ\n\n### 4. **дҪҝз”Ё**\n\n- жү“ејҖSlimeVRжңҚеҠЎз«ҜпјҢжҢүжҸҗзӨәж“ҚдҪң\n\n### 5. **е…¶д»–**\n\nBMI270зҡ„i2cең°еқҖжҳҜ0x68(еҪ“SDOи„ҡжҺҘең°)/0x69(еҪ“SDOи„ҡжӢүй«ҳ)пјҢSlimeVRжәҗз Ғдёӯ`MPU9250`/`BMI160`/`MPU6500`/`ICM20948`/`ICM42688`й»ҳи®ӨдҪңдёәдё»дј ж„ҹеҷЁзҡ„i2cең°еқҖдёә0x68пјҢжҲ‘еңЁз”»з¬¬дёҖзүҲзҡ„ж—¶еҖҷжҳҜе°ҶSDOи„ҡжӢүй«ҳдәҶпјҢжүҖд»ҘжҠҠ`src`/`sensors`/`sensoraddresses.h`ж–Үд»¶дёӯзҡ„0x68дёҺ0x69еҒҡдәҶжӣҝжҚўпјҢдҝ®ж”№иҝҮзҡ„зүҲжң¬ж— йңҖжіЁж„Ҹ\n\n### 6. **ж„ҹи°ў**\n\n- дё»иҰҒз”өи·ҜеҸӮиҖғ[SlimeVR_BNO085](https://oshwhub.com/myzhazha/slimevr)пјҢж„ҹи°ў\n"])</script><script>self.__next_f.push([1,"8:[\"$\",\"$L13\",null,{\"post\":{\"title\":\"SlimeVR_BMI270\",\"date\":\"2024-06-06\",\"categories\":[\"зЎ¬д»¶\"],\"tags\":[],\"pinned\":false,\"slug\":\"SlimeVR-BMI270\",\"content\":\"$14\"},\"postPath\":\"/posts/2024/06/06/SlimeVR-BMI270\",\"prevPost\":null,\"nextPost\":null,\"walineConfig\":{\"serverURL\":\"https://waline.sanksu.cn/\",\"emoji\":[\"//cdn.jsdelivr.net/gh/Sanksu/Waline_Bang_Dream_emoji@1.9.0/src/BangDream/\",\"//cdn.jsdelivr.net/gh/Sanksu/Waline_Bang_Dream_emoji@1.9.0/src/Popipa/\",\"//cdn.jsdelivr.net/gh/Sanksu/Waline_Bang_Dream_emoji@1.9.0/src/Afterglow/\",\"//cdn.jsdelivr.net/gh/Sanksu/Waline_Bang_Dream_emoji@1.9.0/src/RAS/\",\"//cdn.jsdelivr.net/gh/Sanksu/Waline_Bang_Dream_emoji@1.9.0/src/PastelPalettes/\",\"//cdn.jsdelivr.net/gh/Sanksu/Waline_Bang_Dream_emoji@1.9.0/src/Mygo/\",\"//cdn.jsdelivr.net/gh/Sanksu/Waline_Bang_Dream_emoji@1.9.0/src/AveMujica/\"]}}]\n"])</script><script>self.__next_f.push([1,"e:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-s
